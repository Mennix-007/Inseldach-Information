<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kundenbenachrichtigung</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f3f5f7;
  color:#111;
}

.topBar{
  position:sticky;
  top:0;
  z-index:50;
  background:#163d7a;
  color:#fff;
  padding:12px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}

.topBarTitle{
  font-size:22px;
  font-weight:800;
}

.topBarActions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  border:none;
  border-radius:10px;
  padding:10px 14px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
}

.btnBlue{ background:#fff; color:#163d7a; }
.btnYellow{ background:#ffd400; color:#000; }
.btnGreen{ background:#25D366; color:#111; }

.page{
  max-width:1100px;
  margin:22px auto;
  background:#fff;
  box-shadow:0 8px 28px rgba(0,0,0,.12);
  border-radius:18px;
  padding:26px;
}

.section{
  margin-bottom:18px;
}

.sectionTitle{
  margin:0 0 8px;
  font-size:20px;
  font-weight:800;
  color:#163d7a;
}

.box{
  border:1px solid #cfd6df;
  border-radius:12px;
  padding:12px 14px;
  background:#fbfcfd;
  white-space:pre-wrap;
}

.imageGrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

.imageCard{
  border:1px solid #cfd6df;
  border-radius:12px;
  background:#fbfcfd;
  min-height:200px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.imageCard img{
  width:100%;
  height:200px;
  object-fit:contain;
}
</style>
</head>

<body>

<div class="topBar">
  <div class="topBarTitle">Kundenbenachrichtigung – Ansicht</div>

  <div class="topBarActions">
    <button class="btn btnBlue" onclick="openFormular()">← Formular</button>
    <button class="btn btnBlue" onclick="reloadPage()">Neu laden</button>
    <button class="btn btnYellow" onclick="window.print()">PDF erzeugen</button>
    <button class="btn btnGreen" onclick="openWhatsApp()">WhatsApp</button>
  </div>
</div>

<div class="page">

  <div class="section">
    <h2 class="sectionTitle">Kunde</h2>
    <div class="box" id="kunde">—</div>
  </div>

  <div class="section">
    <h2 class="sectionTitle">Adresse</h2>
    <div class="box" id="baustellenadresse">—</div>
  </div>

  <div class="section">
    <h2 class="sectionTitle">Bilder</h2>
    <div class="imageGrid">
      <div class="imageCard" id="bild1">—</div>
      <div class="imageCard" id="bild2">—</div>
      <div class="imageCard" id="bild3">—</div>
    </div>
  </div>

  <div class="section">
    <h2 class="sectionTitle">Information</h2>
    <div class="box" id="text">—</div>
  </div>

</div>

<script>

let data = null;

// =========================
// NAVIGATION
// =========================

function openFormular(){
  window.location.href = 'kundenbenachrichtigung-formular.html';
}

function reloadPage(){
  location.reload();
}

// =========================
// WHATSAPP
// =========================

function openWhatsApp(){
  if(!data){
    alert("Keine Daten geladen");
    return;
  }

  let msg = "";

  if(data.kunde){
    msg += "Kunde:\n" + data.kunde + "\n\n";
  }

  if(data.baustellenadresse){
    msg += "Adresse:\n" + data.baustellenadresse + "\n\n";
  }

  if(data.text){
    msg += data.text;
  }

  window.open("https://wa.me/?text=" + encodeURIComponent(msg));
}

// =========================
// LOAD DATA
// =========================

function setText(id, val){
  const el = document.getElementById(id);
  if(!el) return;
  el.textContent = val || "—";
}

function setImage(id, val){
  const el = document.getElementById(id);
  if(!el) return;

  if(!val){
    el.textContent = "Kein Bild";
    return;
  }

  el.innerHTML = `<img src="${val}">`;
}

async function load(){
  const raw = localStorage.getItem("kundenbenachrichtigung_preview_data");

  if(raw){
    data = JSON.parse(raw);
  } else {
    alert("Keine Daten gefunden");
    return;
  }

  setText("kunde", data.kunde);
  setText("baustellenadresse", data.baustellenadresse);
  setText("text", data.text);

  setImage("bild1", data.uploadBild1 || data.bild1);
  setImage("bild2", data.uploadBild2 || data.bild2);
  setImage("bild3", data.uploadBild3 || data.bild3);
}

load();

</script>

</body>
</html>
