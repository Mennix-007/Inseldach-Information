<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kundenbenachrichtigung</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f3f5f7;
  color:#111;
}

.topBar{
  position:sticky;
  top:0;
  background:#163d7a;
  color:#fff;
  padding:14px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.pageLayout{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:20px;
  max-width:1600px;
  margin:20px auto;
  padding:0 16px 24px;
}

.sideBar{
  background:#163d7a;
  border-radius:18px;
  padding:16px;
}

.btn{
  width:100%;
  margin-bottom:10px;
  padding:12px;
  font-weight:700;
  cursor:pointer;
}

.page{
  background:#fff;
  border-radius:18px;
  padding:26px;
}

.section{margin-bottom:18px;}

.box{
  border:1px solid #cfd6df;
  border-radius:12px;
  padding:12px;
  background:#fbfcfd;
  white-space:pre-wrap;
}

/* ===== FIX GEGEN ZERSCHNITTENE BILDER ===== */
.imageGrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  break-inside:avoid;
  page-break-inside:avoid;
}

.imageCard{
  min-height:220px;
  border:1px solid #cfd6df;
  display:flex;
  align-items:center;
  justify-content:center;
  break-inside:avoid;
  page-break-inside:avoid;
}

.imageCard img{
  width:100%;
  height:220px;
  object-fit:contain;
  break-inside:avoid;
  page-break-inside:avoid;
}

@media print{

  .topBar,.sideBar{display:none;}

  .section,
  .imageGrid,
  .imageCard{
    break-inside:avoid !important;
    page-break-inside:avoid !important;
  }

  .imageCard img{
    height:200px;
  }
}
</style>
</head>

<body>

<div class="topBar">Kundenbenachrichtigung – Druckansicht</div>

<div class="pageLayout">

<div class="sideBar">
<button class="btn" onclick="window.print()">Drucken</button>
<button class="btn" onclick="location.reload()">Neu laden</button>
</div>

<div class="page">

<div class="section">
<h2>Kunde</h2>
<div class="box" id="kunde">—</div>
</div>

<div class="section">
<h2>Adresse</h2>
<div class="box" id="baustellenadresse">—</div>
</div>

<div class="section">
<h2>Bilder</h2>
<div class="imageGrid">
<div class="imageCard" id="bild1"></div>
<div class="imageCard" id="bild2"></div>
<div class="imageCard" id="bild3"></div>
</div>
</div>

<div class="section">
<h2>Text</h2>
<div class="box" id="text">—</div>
</div>

</div>
</div>

<script>
function setImage(id, val){
  const el = document.getElementById(id);
  if(!val){el.textContent="Kein Bild"; return;}
  el.innerHTML = `<img src="${val}">`;
}

const data = JSON.parse(localStorage.getItem('kundenbenachrichtigung_preview_data')||"{}");

document.getElementById('kunde').textContent = data.kunde||"—";
document.getElementById('baustellenadresse').textContent = data.baustellenadresse||"—";
document.getElementById('text').textContent = data.text||"—";

setImage('bild1',data.uploadBild1||data.bild1);
setImage('bild2',data.uploadBild2||data.bild2);
setImage('bild3',data.uploadBild3||data.bild3);
</script>

</body>
</html>
