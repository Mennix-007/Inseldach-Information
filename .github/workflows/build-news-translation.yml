name: Build bilingual news.json

on:
  push:
    branches:
      - main
    paths:
      - "news-source.json"
      - "scripts/build-news-json.js"
      - ".github/workflows/build-news-translation.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-news:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: news.json erzeugen
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: node scripts/build-news-json.js

      - name: Änderungen committen
        run: |
          if git diff --quiet news.json; then
            echo "Keine Änderungen an news.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          git commit -m "Auto-build bilingual news.json"
          git push
