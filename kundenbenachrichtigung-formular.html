<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kundenbenachrichtigung – Formular</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f3f5f7;
}

.wrap{
  max-width:1200px;
  margin:20px auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:20px;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
  min-width:0;
}

h2{
  margin-top:0;
  color:#163d7a;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

textarea{
  min-height:90px;
}

.btn{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:700;
  margin:4px 4px 0 0;
}

.btnGreen{ background:#25D366; }
.btnBlue{ background:#163d7a; color:#fff; }
.btnYellow{ background:#ffd400; color:#000; }
.btnRed{ background:#8b1e1e; color:#fff; }

.preview{
  white-space:pre-wrap;
  background:#f8fafc;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  min-height:220px;
  overflow-wrap:anywhere;
  word-break:break-word;
}

.imageRow{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.imageBox{
  border:1px solid #ccc;
  border-radius:8px;
  min-height:170px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:#fff;
  color:#666;
  font-weight:700;
}

.imageBox img{
  width:100%;
  height:170px;
  object-fit:contain;
  display:block;
}

.helper{
  font-size:13px;
  color:#555;
  line-height:1.4;
  margin-top:4px;
}

@media (max-width: 980px){
  .wrap{
    grid-template-columns:1fr;
  }

  .imageRow{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="wrap">

  <div class="card">
    <h2>Kundenbenachrichtigung eingeben</h2>

    <input id="kunde" placeholder="Kunde">
    <textarea id="adresse" placeholder="Baustellenadresse"></textarea>
    <textarea id="text" placeholder="Aktuelle Information"></textarea>

    <label>Bild 1</label>
    <input type="file" id="bild1" accept="image/*">

    <label>Bild 2</label>
    <input type="file" id="bild2" accept="image/*">

    <label>Bild 3</label>
    <input type="file" id="bild3" accept="image/*">

    <textarea id="sonstiges" placeholder="Sonstiges"></textarea>

    <div class="helper">
      Die Bilder werden hier direkt für Vorschau und Druckansicht verwendet.  
      In den eingegebenen Daten steht nur, ob ein Bild vorhanden ist.
    </div>

    <div style="margin-top:14px;">
      <button class="btn btnGreen" onclick="openPreview()">Kundenansicht öffnen</button>
      <button class="btn btnGreen" onclick="sendWhatsApp()">WhatsApp</button>
      <button class="btn btnBlue" onclick="copyCustomerText()">Kopie Kunde (Drag and Drop)</button>
      <button class="btn btnBlue" onclick="showJSON()">Eingegebene Daten</button>
      <button class="btn btnYellow" onclick="downloadJSON()">Eingegebene Daten herunterladen</button>
      <button class="btn btnRed" onclick="clearForm()">Formular leeren</button>
    </div>
  </div>

  <div class="card">
    <h2>Vorschau</h2>
    <div id="previewText" class="preview"></div>

    <div class="imageRow">
      <div class="imageBox" id="box1">Kein Bild</div>
      <div class="imageBox" id="box2">Kein Bild</div>
      <div class="imageBox" id="box3">Kein Bild</div>
    </div>
  </div>

</div>

<script>
let uploadImages = ["","",""];

function getData(){
  return {
    kunde: document.getElementById("kunde").value.trim(),
    baustellenadresse: document.getElementById("adresse").value.trim(),
    text: document.getElementById("text").value.trim(),
    sonstiges: document.getElementById("sonstiges").value.trim(),
    uploadBild1: uploadImages[0] || "",
    uploadBild2: uploadImages[1] || "",
    uploadBild3: uploadImages[2] || "",
    feedbackFrage1: "Finden Sie es gut, dass Sie von uns eine Benachrichtigung über WhatsApp erhalten?",
    feedbackFrage2: "Möchten Sie auch in Zukunft weiter Nachrichten von der Firma Inseldachdecker erhalten?",
    feedbackAntwortVorlage: "Antwort bitte kurz per WhatsApp:\n1. Benachrichtigung gut? Ja / Nein\n2. Weitere Nachrichten? Ja / Nein\n3. Falls gewünscht, Ihre Anmerkung:"
  };
}

function buildMapsLink(data){
  const query = data.baustellenadresse || data.kunde;
  if(!query) return "";
  return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(query);
}

function buildText(data){
  const maps = buildMapsLink(data);
  let t = "Moin,\n\n";
  t += "wir möchten Sie heute über den aktuellen Stand Ihrer Baustelle informieren.\n\n";

  if(data.kunde){
    t += "Kunde:\n" + data.kunde + "\n\n";
  }

  if(data.baustellenadresse){
    t += "Baustellenadresse:\n" + data.baustellenadresse + "\n\n";
  }

  if(maps){
    t += "Google Maps:\n" + maps + "\n\n";
  }

  if(data.text){
    t += "Aktuelle Information:\n" + data.text + "\n\n";
  }

  if(data.uploadBild1 || data.uploadBild2 || data.uploadBild3){
    t += "Bilder sind im Formular enthalten\n\n";
  }

  t += "Das können wir Ihnen aus anbieten:\n";
  t += "Dachdeckerarbeiten, Zimmereiarbeiten, Abdichtungen, Dachfenster, Reparaturen, Gerüstbau, Klempnerarbeiten, Dachgaubenbau, Holzrahmenbau, Dachterrassen und Beläge, Balkonabdichtung mit Triflex\n\n";

  t += data.feedbackFrage1 + "\n";
  t += data.feedbackFrage2 + "\n\n";
  t += data.feedbackAntwortVorlage + "\n\n";

  if(data.sonstiges){
    t += "Sonstiges:\n" + data.sonstiges;
  }

  return t.trim();
}

function updatePreview(){
  const data = getData();
  document.getElementById("previewText").textContent = buildText(data);
}

function setImageBox(boxId, src){
  const box = document.getElementById(boxId);
  if(!src){
    box.innerHTML = "Kein Bild";
    return;
  }
  box.innerHTML = `<img src="${src}" alt="Vorschau">`;
}

function readImage(input, index){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    uploadImages[index] = e.target.result;
    setImageBox("box" + (index + 1), e.target.result);
    updatePreview();
  };
  reader.readAsDataURL(file);
}

document.getElementById("bild1").addEventListener("change", e => readImage(e.target, 0));
document.getElementById("bild2").addEventListener("change", e => readImage(e.target, 1));
document.getElementById("bild3").addEventListener("change", e => readImage(e.target, 2));

document.querySelectorAll("input[type='text'], textarea").forEach(el => {
  el.addEventListener("input", updatePreview);
});

function openPreview(){
  const data = getData();
  data.autoPrint = false;
  data.autoWhatsApp = false;
  localStorage.setItem("kundenbenachrichtigung_preview_data", JSON.stringify(data));
  window.open("kundenbenachrichtigung.html", "_blank");
}

function sendWhatsApp(){
  const data = getData();
  const text = encodeURIComponent(buildText(data));
  window.open("https://wa.me/?text=" + text, "_blank");
}

async function copyCustomerText(){
  const data = getData();
  const txt = buildText(data);
  try{
    await navigator.clipboard.writeText(txt);
    alert("Kundenkopie wurde kopiert.");
  }catch(e){
    const ta = document.createElement("textarea");
    ta.value = txt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
    alert("Kundenkopie wurde kopiert.");
  }
}

function showJSON(){
  const data = getData();
  const clean = {
    kunde: data.kunde,
    baustellenadresse: data.baustellenadresse,
    text: data.text,
    sonstiges: data.sonstiges,
    bilder: [
      data.uploadBild1 ? "Bild vorhanden" : "",
      data.uploadBild2 ? "Bild vorhanden" : "",
      data.uploadBild3 ? "Bild vorhanden" : ""
    ],
    feedbackFrage1: data.feedbackFrage1,
    feedbackFrage2: data.feedbackFrage2,
    feedbackAntwortVorlage: data.feedbackAntwortVorlage
  };

  const win = window.open("", "_blank");
  win.document.write("<pre>" + JSON.stringify(clean, null, 2) + "</pre>");
}

function downloadJSON(){
  const data = getData();
  const clean = {
    kunde: data.kunde,
    baustellenadresse: data.baustellenadresse,
    text: data.text,
    sonstiges: data.sonstiges,
    feedbackFrage1: data.feedbackFrage1,
    feedbackFrage2: data.feedbackFrage2,
    feedbackAntwortVorlage: data.feedbackAntwortVorlage
  };

  const blob = new Blob([JSON.stringify(clean, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "kundeninfo.json";
  a.click();
  URL.revokeObjectURL(url);
}

function clearForm(){
  if(!confirm("Formular wirklich leeren?")) return;

  document.getElementById("kunde").value = "";
  document.getElementById("adresse").value = "";
  document.getElementById("text").value = "";
  document.getElementById("sonstiges").value = "";
  document.getElementById("bild1").value = "";
  document.getElementById("bild2").value = "";
  document.getElementById("bild3").value = "";
  uploadImages = ["","",""];
  setImageBox("box1","");
  setImageBox("box2","");
  setImageBox("box3","");
  updatePreview();
}

updatePreview();
</script>

</body>
</html>
