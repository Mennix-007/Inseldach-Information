<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kundenbenachrichtigung</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f3f5f7;
}

.topBar{
  background:#163d7a;
  color:#fff;
  padding:14px;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
}

.btn{
  border:none;
  padding:10px 14px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

.btnGreen{background:#25D366;}
.btnBlue{background:#fff;color:#163d7a;}
.btnYellow{background:#ffd400;color:#000;}

.page{
  max-width:900px;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.preview{
  border:2px solid #163d7a;
  padding:15px;
  margin-top:20px;
  white-space:pre-wrap;
}

.imageRow{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.imageBox{
  border:1px solid #ccc;
  height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.imageBox img{
  width:100%;
  height:100%;
  object-fit:contain;
}
</style>
</head>

<body>

<div class="topBar">
  <div><b>Kundenbenachrichtigung</b></div>

  <div>
    <button class="btn btnGreen" onclick="sendWhatsApp()">WhatsApp</button>
    <button class="btn btnBlue" onclick="copyText()">Kopieren (Craftnote)</button>
    <button class="btn btnYellow" onclick="exportJSON()">JSON</button>
  </div>
</div>

<div class="page">

<input id="kunde" placeholder="Kunde">
<input id="baustelle" placeholder="Baustellenname">
<input id="adresse" placeholder="Adresse">

<textarea id="text" placeholder="Aktuelle Information"></textarea>

<h3>Bilder auswählen</h3>

<input type="file" accept="image/*" onchange="loadImage(event,1)">
<input type="file" accept="image/*" onchange="loadImage(event,2)">
<input type="file" accept="image/*" onchange="loadImage(event,3)">

<div class="imageRow">
  <div class="imageBox"><img id="img1"></div>
  <div class="imageBox"><img id="img2"></div>
  <div class="imageBox"><img id="img3"></div>
</div>

<textarea id="sonstiges" placeholder="Sonstiges"></textarea>

<div class="preview" id="preview"></div>

</div>

<script>
let images = ["","",""];

function loadImage(e, index){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(ev){
    images[index-1] = ev.target.result;
    document.getElementById("img"+index).src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function buildText(){
  let t = "";
  t += "Moin,\n\n";
  t += "Baustelle: " + val("baustelle") + "\n";
  t += "Adresse: " + val("adresse") + "\n\n";
  t += val("text") + "\n\n";
  t += "Leistungen:\nDachdeckerarbeiten, Holzrahmenbau, Dachgauben, Balkonabdichtung, Dachterrassen\n\n";
  t += val("sonstiges") + "\n\n";
  t += "Viele Grüße\nInseldachdecker";

  return t;
}

function val(id){
  return document.getElementById(id).value || "";
}

function updatePreview(){
  document.getElementById("preview").textContent = buildText();
}

setInterval(updatePreview, 500);

function sendWhatsApp(){
  const text = encodeURIComponent(buildText());
  window.open("https://wa.me/?text=" + text);
}

function copyText(){
  navigator.clipboard.writeText(buildText());
  alert("Kopiert für Craftnote");
}

function exportJSON(){
  const data = {
    kunde: val("kunde"),
    baustelle: val("baustelle"),
    adresse: val("adresse"),
    text: val("text"),
    sonstiges: val("sonstiges"),
    images: images
  };

  const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "kundeninfo.json";
  a.click();
}
</script>

</body>
</html>
