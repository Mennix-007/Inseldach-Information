<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baustellenstart Formular</title>

<style>
body{font-family:Arial;margin:0;background:#f3f5f7}
.wrap{max-width:1100px;margin:20px auto;background:#fff;padding:20px;border-radius:12px}

h1{margin-top:0}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:1/-1}

input, textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

textarea{min-height:80px}

.btn{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.btnGreen{background:#25D366}
.btnBlue{background:#163d7a;color:#fff}
.btnYellow{background:#ffd400}

.imagePreview{
  display:flex;
  gap:10px;
}

.imagePreview img{
  width:100%;
  height:140px;
  object-fit:contain;
  border:1px solid #ccc;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="wrap">
<h1>Start neue Baustelle</h1>

<div class="grid">

<input id="name" placeholder="Baustellenname">
<input id="adresse" placeholder="Adresse">

<textarea id="was" class="full" placeholder="Was wird gemacht"></textarea>

<input type="file" id="img1">
<input type="file" id="img2">
<input type="file" id="img3">

<div class="imagePreview full">
  <img id="prev1">
  <img id="prev2">
  <img id="prev3">
</div>

</div>

<br>

<button class="btn btnBlue" onclick="openPreview()">Vorschau öffnen</button>
<button class="btn btnGreen" onclick="sendWhatsApp()">WhatsApp senden</button>
<button class="btn btnYellow" onclick="downloadJSON()">JSON Download</button>

</div>

<script>
let data = {};

function readImage(input, previewId){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e=>{
    document.getElementById(previewId).src = e.target.result;
    data[previewId] = e.target.result;
  }
  reader.readAsDataURL(file);
}

document.getElementById("img1").onchange = e=>readImage(e.target,"prev1");
document.getElementById("img2").onchange = e=>readImage(e.target,"prev2");
document.getElementById("img3").onchange = e=>readImage(e.target,"prev3");

function collect(){
  data.name = document.getElementById("name").value;
  data.adresse = document.getElementById("adresse").value;
  data.was = document.getElementById("was").value;
}

function openPreview(){
  collect();
  localStorage.setItem("baustelle", JSON.stringify(data));
  window.open("baustellenstart.html","_blank");
}

function sendWhatsApp(){
  collect();

  let maps = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(data.adresse);

  let text =
`Start Baustelle

${data.name}

${data.adresse}

${data.was}

Google Maps:
${maps}`;

  window.open("https://wa.me/?text=" + encodeURIComponent(text));
}

function downloadJSON(){
  collect();
  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "baustelle.json";
  a.click();
}
</script>

</body>
</html>
