<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nowy start budowy – widok do druku</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f3f5f7;
  color:#111;
}

.topBar{
  position:sticky;
  top:0;
  z-index:100;
  background:#163d7a;
  color:#fff;
  padding:14px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}

.topBarTitle{
  font-size:24px;
  font-weight:800;
}

.topBarLogo img{
  max-height:50px;
  background:#fff;
  padding:4px 8px;
  border-radius:10px;
}

.pageLayout{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:20px;
  max-width:1600px;
  margin:20px auto;
  padding:0 16px 24px;
}

.sideBar{
  background:#163d7a;
  border-radius:18px;
  padding:16px;
  position:sticky;
  top:90px;
}

.sideBarTitle{
  color:#fff;
  text-align:center;
  font-weight:800;
  margin-bottom:14px;
}

.sideBarButtons{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.btn{
  width:100%;
  min-height:54px;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  cursor:pointer;
  background:#fff;
  color:#163d7a;
  border:1px solid #d4dbe4;
}

.page{
  background:#fff;
  box-shadow:0 8px 28px rgba(0,0,0,.12);
  border-radius:18px;
  padding:26px;
}

.docHeader{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  margin-bottom:22px;
  border-bottom:3px solid #163d7a;
  padding-bottom:16px;
}

.docTitle{
  font-size:34px;
  font-weight:900;
  color:#8b1e1e;
}

.sectionTitle{
  font-size:20px;
  font-weight:800;
  color:#163d7a;
  margin-bottom:8px;
}

.box{
  border:1px solid #cfd6df;
  border-radius:12px;
  padding:12px;
  background:#fbfcfd;
  white-space:pre-wrap;
}

.doubleGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.imageGrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

.imageCard{
  border:1px solid #cfd6df;
  border-radius:12px;
  min-height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.imageCard.empty{
  background:#eef2f5;
  color:#666;
  font-weight:700;
}

@media print{
  .topBar,.sideBar{display:none !important;}
  .pageLayout{display:block;}
  .page{box-shadow:none;border-radius:0;padding:0;}
}
</style>
</head>

<body>

<div class="topBar">
  <div class="topBarTitle">Nowy start budowy</div>
  <div class="topBarLogo">
    <img src="Logo_Menne_min.png">
  </div>
</div>

<div class="pageLayout">

<!-- Sidebar -->
<aside class="sideBar">
  <div class="sideBarTitle">Akcje</div>

  <div class="sideBarButtons">
    <button class="btn" onclick="openWhatsApp()">WhatsApp</button>
    <button class="btn" onclick="window.print()">Drukuj / PDF</button>
    <button class="btn" onclick="location.reload()">Odśwież</button>
  </div>
</aside>

<!-- Inhalt -->
<div class="page">

<div class="docHeader">
  <div>
    <h1 class="docTitle">Nowy start budowy</h1>
    <p id="docDate"></p>
  </div>
  <img src="Logo_Menne_min.png" style="width:200px">
</div>

<div class="section">
  <div class="sectionTitle">Zleceniodawca</div>
  <div class="box" id="baustellenname"></div>
</div>

<div class="section">
  <div class="sectionTitle">Adres budowy</div>
  <div class="box" id="baustellenadresse"></div>
</div>

<div class="section">
  <div class="sectionTitle">Opis prac</div>
  <div class="box" id="worumGehtEs"></div>
</div>

<div class="section">
  <div class="sectionTitle">Dostawa</div>
  <div class="doubleGrid">
    <div class="box" id="lieferung1"></div>
    <div class="box" id="lieferung3"></div>
  </div>
</div>

<div class="section">
  <div class="sectionTitle">Magazyn</div>
  <div class="doubleGrid">
    <div class="box" id="lager1"></div>
    <div class="box" id="lager3"></div>
  </div>
</div>

<div class="section">
  <div class="sectionTitle">Zdjęcia</div>
  <div class="imageGrid">
    <div class="imageCard empty" id="img1">Brak zdjęcia</div>
    <div class="imageCard empty" id="img2">Brak zdjęcia</div>
    <div class="imageCard empty" id="img3">Brak zdjęcia</div>
  </div>
</div>

<div class="section">
  <div class="sectionTitle">Pozostałe</div>
  <div class="box" id="sonstiges"></div>
</div>

</div>
</div>

<script>
let data=null;

function setText(id,val){
  document.getElementById(id).textContent=val||"—";
}

function setImage(id,val){
  const box=document.getElementById(id);
  if(!val){box.className="imageCard empty";box.textContent="Brak zdjęcia";return;}
  box.className="imageCard";
  box.innerHTML=`<img src="${val}" style="width:100%;height:220px;object-fit:contain">`;
}

function openWhatsApp(){
  if(!data)return;
  const txt="Nowy start budowy\n\n"+(data.baustellenname||"");
  window.open("https://wa.me/?text="+encodeURIComponent(txt));
}

async function load(){
  const raw=localStorage.getItem('baustellenstart_preview_data');
  if(!raw)return;
  data=JSON.parse(raw);

  setText("baustellenname",data.baustellenname);
  setText("baustellenadresse",data.baustellenadresse);
  setText("worumGehtEs",data.worumGehtEs);
  setText("lieferung1",data.lieferung1);
  setText("lieferung3",data.lieferung3);
  setText("lager1",data.lager1);
  setText("lager3",data.lager3);
  setText("sonstiges",data.sonstiges);

  setImage("img1",data.uploadBild1||data.bild1);
  setImage("img2",data.uploadBild2||data.bild2);
  setImage("img3",data.uploadBild3||data.bild3);

  document.getElementById("docDate").textContent=new Date().toLocaleDateString('pl-PL');
}

load();
</script>

</body>
</html>
