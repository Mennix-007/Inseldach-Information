<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baustelle</title>

<style>
body{font-family:Arial;margin:0;background:#fff}

.wrap{
  max-width:900px;
  margin:20px auto;
  padding:20px;
}

h1{color:#8b1e1e}

.box{
  border:1px solid #ccc;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
}

.images{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.images img{
  width:100%;
  height:200px;
  object-fit:contain;
  border:1px solid #ccc;
}

.btn{
  margin:10px 5px;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

.btnGreen{background:#25D366}
.btnBlue{background:#163d7a;color:#fff}
</style>
</head>

<body>

<div class="wrap">

<h1 id="name"></h1>

<div class="box" id="adresse"></div>

<div class="box" id="was"></div>

<div class="images">
  <img id="img1">
  <img id="img2">
  <img id="img3">
</div>

<br>

<button class="btn btnBlue" onclick="window.print()">PDF erstellen</button>
<button class="btn btnGreen" onclick="sendWhatsApp()">WhatsApp</button>

</div>

<script>
let data = JSON.parse(localStorage.getItem("baustelle") || "{}");

document.getElementById("name").innerText = data.name || "";
document.getElementById("adresse").innerText = data.adresse || "";
document.getElementById("was").innerText = data.was || "";

document.getElementById("img1").src = data.prev1 || "";
document.getElementById("img2").src = data.prev2 || "";
document.getElementById("img3").src = data.prev3 || "";

function sendWhatsApp(){

  let maps = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(data.adresse);

  let text =
`Start Baustelle

${data.name}

${data.adresse}

${data.was}

Google Maps:
${maps}`;

  window.open("https://wa.me/?text=" + encodeURIComponent(text));
}
</script>

</body>
</html>
