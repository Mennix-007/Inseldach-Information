<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Neustart Baustelle</title>

<style>
body{
  font-family:Arial,Helvetica,sans-serif;
  margin:0;
  padding:20px;
  background:#f4f6f9;
}

.container{
  max-width:1200px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo{
  height:80px;
}

h1{
  margin:0;
}

.buttonBar{
  margin-bottom:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  padding:10px 20px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  border-radius:8px;
}

.btnBlue{
  background:#163d7a;
  color:#fff;
}

.btnYellow{
  background:#ffd400;
  color:#000;
}

.section{
  margin-bottom:20px;
}

textarea{
  width:100%;
  min-height:100px;
}

.grid-3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.box{
  border:1px solid #ccc;
  padding:10px;
  min-height:120px;
}

.images{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.images img{
  width:100%;
  height:150px;
  object-fit:cover;
  border:1px solid #ccc;
}

/* ===== DRUCK CHECKBOX FIX ===== */
@media print{

  .buttonBar{
    display:none;
  }

  input[type="checkbox"]{
    display:none;
  }

  .print-checkbox{
    display:inline-block;
    width:20px;
    height:20px;
    border:2px solid #000;
    margin-right:6px;
    vertical-align:middle;
    position:relative;
  }

  .print-checkbox.checked::after{
    content:"✔";
    position:absolute;
    left:2px;
    top:-2px;
    font-size:18px;
    font-weight:bold;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1 id="title">Neustart Baustelle</h1>
  <img src="Logo_Menne_min.png" class="logo">
</div>

<div class="buttonBar">
  <button class="btn btnBlue" onclick="location.reload()">Neu laden</button>
  <button class="btn btnBlue" onclick="openPolishVersion()">Polnisch erzeugen</button>
  <button class="btn btnYellow" onclick="window.print()">Drucken / PDF</button>
</div>

<div class="section">
  <label>Baustellenadresse</label>
  <textarea id="adresse"></textarea>
</div>

<div class="section">
  <label><span class="print-checkbox" id="pcb1"></span><input type="checkbox" id="cb1"> Gesamte Baustelle Stundenlohn</label><br>
  <label><span class="print-checkbox" id="pcb2"></span><input type="checkbox" id="cb2"> Teilweise Stundenlohn</label><br>
  <label><span class="print-checkbox" id="pcb3"></span><input type="checkbox" id="cb3"> Eventuell teilweise Stundenlohn</label><br>
  <label><span class="print-checkbox" id="pcb4"></span><input type="checkbox" id="cb4"> Festpreisangebot</label>
</div>

<div class="section">
  <select id="zugang">
    <option value="geruest">Gerüst erforderlich</option>
    <option value="leiter">Leiter reicht</option>
  </select>

  <select id="hoehe"></select>
</div>

<div class="section">
  <label>Worum geht es / Was muss gemacht werden</label>
  <textarea id="beschreibung"></textarea>
</div>

<div class="section grid-3">
  <div class="box" contenteditable id="liefer1"></div>
  <div class="box" contenteditable id="liefer2"></div>
  <div class="box" contenteditable id="liefer3"></div>
</div>

<div class="section grid-3">
  <div class="box" contenteditable id="lager1"></div>
  <div class="box" contenteditable id="lager2"></div>
  <div class="box" contenteditable id="lager3"></div>
</div>

<div class="section images">
  <img id="img1">
  <img id="img2">
  <img id="img3">
</div>

<div class="section">
  <label>Sonstiges</label>
  <textarea id="sonstiges"></textarea>
</div>

</div>

<script>

// Höhe füllen
for(let i=2;i<=15;i+=0.5){
  let opt=document.createElement("option");
  opt.value=i.toFixed(2);
  opt.textContent=i.toFixed(2).replace(".",",")+" m";
  document.getElementById("hoehe").appendChild(opt);
}

// JSON laden
fetch("baustellenstart.json?"+Date.now())
.then(r=>r.json())
.then(d=>{
  document.getElementById("title").textContent=d.title||"Neustart Baustelle";
  document.getElementById("adresse").value=d.baustellenadresse||"";

  document.getElementById("cb1").checked=d.gesamteBaustelleStundenlohn;
  document.getElementById("cb2").checked=d.teilweiseStundenlohn;
  document.getElementById("cb3").checked=d.eventuellTeilweiseStundenlohn;
  document.getElementById("cb4").checked=d.festpreisangebot;

  document.getElementById("beschreibung").value=d.worumGehtEs||"";
  document.getElementById("sonstiges").value=d.sonstiges||"";

  document.getElementById("liefer1").innerText=d.lieferung1||"";
  document.getElementById("liefer2").innerText=d.lieferung2||"";
  document.getElementById("liefer3").innerText=d.lieferung3||"";

  document.getElementById("lager1").innerText=d.lager1||"";
  document.getElementById("lager2").innerText=d.lager2||"";
  document.getElementById("lager3").innerText=d.lager3||"";

  document.getElementById("zugang").value=d.zugang||"";
  document.getElementById("hoehe").value=d.baustellenhoehe||"";

  if(d.bild1) document.getElementById("img1").src=d.bild1;
  if(d.bild2) document.getElementById("img2").src=d.bild2;
  if(d.bild3) document.getElementById("img3").src=d.bild3;
});

// Checkbox Druck Sync
function syncPrintCheckboxes(){
  const map=[
    ["cb1","pcb1"],
    ["cb2","pcb2"],
    ["cb3","pcb3"],
    ["cb4","pcb4"]
  ];

  map.forEach(([c,p])=>{
    let cb=document.getElementById(c);
    let pc=document.getElementById(p);
    if(cb.checked){
      pc.classList.add("checked");
    }else{
      pc.classList.remove("checked");
    }
  });
}

window.addEventListener("beforeprint",syncPrintCheckboxes);

// 👉 POLNISCHE SEITE ÖFFNEN
function openPolishVersion(){
  const url = location.origin + location.pathname.replace("baustellenstart.html","baustellenstart-pl.html");
  window.open(url,"_blank");
}

</script>

</body>
</html>
