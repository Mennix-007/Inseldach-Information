<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inseldachdecker – Info</title>

<style>

body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0b0f14;color:#e9eef5}

.wrap{
display:grid;
grid-template-columns:1.2fr 0.8fr;
gap:24px;
padding:24px;
height:100vh;
box-sizing:border-box;
padding-bottom:64px;
}

.card{
background:#8b1e1e;
border:1px solid #b63a3a;
border-radius:16px;
padding:20px;
position:relative;
overflow:hidden;
box-sizing:border-box;
}

.cardBlue{
background:#163d7a;
border:1px solid #2f63c6;
display:flex;
flex-direction:column;
min-height:0;
}

.cardLongGreen{background:#1f7a36;border:1px solid #2bb457;}

.cardDurYellow{background:#ffd400;border:1px solid #c9a800;color:#000;}

.cardDurYellow h2{color:#000;}

.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}

.brand{font-size:32px;font-weight:800}

.time{
text-align:right;
display:flex;
flex-direction:row;
align-items:baseline;
gap:10px;
white-space:nowrap;
}

.time .clock{font-size:44px;font-weight:700}

.time .weekday{font-size:18px}

.time .date{font-size:18px}

h2{margin:0 0 12px;font-size:26px}

/* LISTEN GRUND */
ul{margin:0;padding-left:22px;line-height:1.35}

li{margin:8px 0}

/* SCHRIFTGRÖSSEN KACHELN */

#heuteWichtig li{
font-size:24px;
}

#daueranzeige li{
font-size:23px;
}

#langzeitInfo li{
font-size:23px;
}

.ticker{
position:fixed;
left:0;
right:0;
bottom:0;
background:#ffd400;
border-top:1px solid #c9a800;
height:52px;
display:flex;
align-items:center;
overflow:hidden;
}

.ticker .inner{
white-space:nowrap;
font-size:28px;
display:inline-flex;
gap:48px;
color:#000;
}

.qrWrap{
width:155px;
height:155px;
background:#fff;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
border:2px solid #fff;
}

#qrcodeImg{
width:140px;
height:140px;
object-fit:contain;
}

.rightStack{
display:flex;
flex-direction:column;
gap:16px;
height:100%;
min-height:0;
flex:1;
}

.panel{
border:1px solid rgba(255,255,255,.25);
border-radius:12px;
overflow:hidden;
background:#0b0f14;
}

:root{
--wxH:250px;
--camH:250px;
--windyMinH:260px;
}

.wxGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.wxBox{
height:var(--wxH);
padding:14px;
display:flex;
flex-direction:column;
gap:12px;
}

.wxNow{
display:flex;
align-items:center;
justify-content:space-between;
padding-bottom:10px;
border-bottom:1px solid rgba(255,255,255,.15);
}

.wxTempBig{font-size:34px;font-weight:900}

.wxSlots{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.wxSlot{
border:1px solid rgba(255,255,255,.18);
border-radius:12px;
padding:10px;
background:rgba(255,255,255,.06);
}

.wxSlotTemp{font-size:20px;font-weight:800}

#camImg{
width:100%;
height:var(--camH);
object-fit:cover;
}

.windyWrap{
flex:1;
min-height:var(--windyMinH);
}

.windyFrame{
width:100%;
height:100%;
border:0;
}

.leftStack{
display:flex;
flex-direction:column;
gap:16px;
height:100%;
}

.leftHeute{flex:4.55}

.leftDauerRow{flex:3.45}

.leftLang{flex:2}

.hintSplitRow{
display:grid;
grid-template-columns:3fr 1fr;
gap:16px;
height:100%;
}

.hintImgBox{
flex:1;
background:#ffd400;
display:flex;
align-items:center;
justify-content:center;
}

#hintImg{
width:100%;
height:100%;
object-fit:contain;
}

</style>
</head>

<body>

<div class="wrap">

<div class="leftStack">

<div class="card leftHeute">

<div class="top">

<div class="brand">
Inseldachdecker - Zeitung - Info
</div>

<div class="time">
<div class="clock" id="clock"></div>
<div class="weekday" id="weekday"></div>
<div class="date" id="date"></div>
</div>

</div>

<hr style="border:0;border-top:1px solid rgba(255,255,255,.25);margin:14px 0;">

<h2>Heute wichtig</h2>

<ul id="heuteWichtig"></ul>

</div>

<div class="hintSplitRow leftDauerRow">

<div class="card cardDurYellow">

<h2>Hinweise</h2>

<ul id="daueranzeige"></ul>

</div>

<div class="card cardDurYellow">

<h2>Bild</h2>

<div class="hintImgBox">

<img id="hintImg">

</div>

</div>

</div>

<div class="card leftLang cardLongGreen">

<h2>Info für längeren Zeitraum</h2>

<ul id="langzeitInfo"></ul>

</div>

</div>

<div class="card cardBlue">

<div class="rightStack">

<div>

<h2>QR-Code</h2>

<div class="qrWrap">

<img id="qrcodeImg">

</div>

</div>

<div>

<div class="panelTitle">Wetter Borkum / Live Webcam</div>

<div class="wxGrid">

<div class="panel">

<div class="wxBox">

<div class="wxNow">

<div>

<div class="wxTempBig" id="wxNowTemp"></div>

<div id="wxNowDesc"></div>

</div>

<div id="wxNowIcon"></div>

</div>

<div class="wxSlots">

<div class="wxSlot">

<div>08:00</div>

<div id="wx8Temp"></div>

</div>

<div class="wxSlot">

<div>13:00</div>

<div id="wx13Temp"></div>

</div>

<div class="wxSlot">

<div>17:00</div>

<div id="wx17Temp"></div>

</div>

</div>

</div>

</div>

<div class="panel">

<img id="camImg"
src="https://www.insellust-borkum.de/Webcam/axis1/image.jpg">

</div>

</div>

</div>

<div>

<div class="panelTitle">Radar Borkum</div>

<div class="panel">

<div class="windyWrap">

<iframe
class="windyFrame"
src="https://embed.windy.com/embed2.html?lat=53.58&lon=6.67&zoom=7&overlay=radar">
</iframe>

</div>

</div>

</div>

</div>

</div>

</div>

<div class="ticker">

<div class="inner" id="tickerInner"></div>

</div>

<script>

function pad(n){return String(n).padStart(2,'0')}

function tickTime(){

const now=new Date()

document.getElementById('clock').textContent=
pad(now.getHours())+":"+pad(now.getMinutes())

document.getElementById('weekday').textContent=
now.toLocaleDateString('de-DE',{weekday:'long'})

document.getElementById('date').textContent=
now.toLocaleDateString('de-DE')

}

setInterval(tickTime,1000)

</script>

</body>
</html>
