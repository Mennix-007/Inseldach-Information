<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Start neue Baustelle – Formular</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f3f5f7;
}

.wrap{
  max-width:1200px;
  margin:20px auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:20px;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
}

h2{
  margin-top:0;
  color:#163d7a;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

textarea{
  min-height:80px;
}

.btn{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:700;
}

.btnGreen{ background:#25D366; }
.btnBlue{ background:#163d7a; color:#fff; }
.btnYellow{ background:#ffd400; }

.preview{
  white-space:pre-wrap;
  background:#f8fafc;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  min-height:200px;
}

img.previewImg{
  width:100%;
  max-height:180px;
  object-fit:contain;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="wrap">

<!-- FORMULAR -->
<div class="card">
  <h2>Baustelle eingeben</h2>

  <input id="name" placeholder="Auftraggeber">
  <textarea id="adresse" placeholder="Adresse"></textarea>
  <textarea id="arbeit" placeholder="Was ist zu tun"></textarea>

  <label>Bild 1</label>
  <input type="file" id="bild1">

  <label>Bild 2</label>
  <input type="file" id="bild2">

  <label>Bild 3</label>
  <input type="file" id="bild3">

  <textarea id="sonstiges" placeholder="Sonstiges"></textarea>

  <button class="btn btnGreen" onclick="openPreview()">Vorschau öffnen</button>
  <button class="btn btnBlue" onclick="showJSON()">Eingegebene Daten</button>
  <button class="btn btnYellow" onclick="downloadJSON()">Eingegebene Daten herunterladen</button>
</div>

<!-- VORSCHAU -->
<div class="card">
  <h2>Vorschau</h2>
  <div id="previewText" class="preview"></div>
  <div id="previewImages"></div>
</div>

</div>

<script>

function getData(){
  return {
    name: document.getElementById("name").value,
    adresse: document.getElementById("adresse").value,
    arbeit: document.getElementById("arbeit").value,
    sonstiges: document.getElementById("sonstiges").value,
    bild1: document.getElementById("bild1").files[0],
    bild2: document.getElementById("bild2").files[0],
    bild3: document.getElementById("bild3").files[0]
  };
}

function buildText(data){

  const maps = data.adresse
    ? "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(data.adresse)
    : "";

  let text = "Neustart Baustelle\n\n";

  if(data.name){
    text += "Auftraggeber:\n" + data.name + "\n\n";
  }

  if(data.adresse){
    text += "Adresse:\n" + data.adresse + "\n\n";
    text += "Google Maps:\n" + maps + "\n\n";
  }

  if(data.arbeit){
    text += "Was ist zu tun:\n" + data.arbeit + "\n\n";
  }

  if(data.bild1 || data.bild2 || data.bild3){
    text += "Bilder sind im Formular enthalten\n\n";
  }

  if(data.sonstiges){
    text += "Sonstiges:\n" + data.sonstiges;
  }

  return text.trim();
}

function updatePreview(){
  const data = getData();

  document.getElementById("previewText").textContent = buildText(data);

  const imgBox = document.getElementById("previewImages");
  imgBox.innerHTML = "";

  ["bild1","bild2","bild3"].forEach(id=>{
    const file = document.getElementById(id).files[0];
    if(file){
      const img = document.createElement("img");
      img.className = "previewImg";
      img.src = URL.createObjectURL(file);
      imgBox.appendChild(img);
    }
  });
}

document.querySelectorAll("input,textarea").forEach(el=>{
  el.addEventListener("input", updatePreview);
});

function openPreview(){
  const data = getData();

  localStorage.setItem("baustellenstart_preview_data", JSON.stringify({
    baustellenname:data.name,
    baustellenadresse:data.adresse,
    worumGehtEs:data.arbeit,
    sonstiges:data.sonstiges
  }));

  window.open("baustellenstart.html","_blank");
}

function showJSON(){
  const data = getData();

  const clean = {
    name:data.name,
    adresse:data.adresse,
    arbeit:data.arbeit,
    sonstiges:data.sonstiges,
    bilder:[
      data.bild1 ? "Bild vorhanden" : "",
      data.bild2 ? "Bild vorhanden" : "",
      data.bild3 ? "Bild vorhanden" : ""
    ]
  };

  const win = window.open();
  win.document.write("<pre>"+JSON.stringify(clean,null,2)+"</pre>");
}

function downloadJSON(){
  const data = getData();

  const clean = {
    name:data.name,
    adresse:data.adresse,
    arbeit:data.arbeit,
    sonstiges:data.sonstiges
  };

  const blob = new Blob([JSON.stringify(clean,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "baustelle.json";
  a.click();
}

updatePreview();

</script>
</body>
</html>
