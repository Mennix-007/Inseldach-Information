<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Start neue Baustelle – Formular</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f3f5f7;
  color:#111;
}

.topBar{
  position:sticky;
  top:0;
  z-index:100;
  background:#163d7a;
  color:#fff;
  padding:14px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}

.topBarTitle{font-size:24px;font-weight:800;}

.topBarLogo img{
  max-height:50px;
  background:#fff;
  padding:4px 8px;
  border-radius:10px;
}

.pageLayout{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:20px;
  max-width:1600px;
  margin:20px auto;
  padding:0 16px 24px;
}

.sideBar{
  background:#163d7a;
  border-radius:18px;
  padding:16px;
  position:sticky;
  top:90px;
}

.sideBarTitle{
  color:#fff;
  text-align:center;
  font-weight:800;
  margin-bottom:14px;
}

.sideBarButtons{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.btn{
  width:100%;
  min-height:54px;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  cursor:pointer;
  background:#fff;
  border:1px solid #d4dbe4;
}

.btnRed{color:#8b1e1e;}

.wrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:20px;
  box-shadow:0 8px 28px rgba(0,0,0,.12);
}

.sectionTitle{
  font-size:18px;
  font-weight:800;
  color:#163d7a;
  margin-bottom:10px;
}

.formGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.fullCol{grid-column:1/-1;}

.fieldWrap textarea{
  min-height:50px;
}

.bigField{
  min-height:180px !important;
}

.previewBox{
  border:1px solid #cfd6df;
  border-radius:12px;
  padding:12px;
  background:#fbfcfd;
  min-height:220px;
  white-space:pre-wrap;
}

.imageGrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.imageCard{
  border:1px solid #ccc;
  border-radius:10px;
  min-height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#copyToast{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#163d7a;
  color:#fff;
  padding:12px 18px;
  border-radius:12px;
  font-weight:700;
  opacity:0;
  transition:.3s;
}
</style>
</head>

<body>

<div id="copyToast">Inhalt kopiert – Drag and Drop bereit.</div>

<div class="topBar">
  <div class="topBarTitle">Start neue Baustelle – Formular</div>
  <div class="topBarLogo">
    <img src="Logo_Menne_min.png">
  </div>
</div>

<div class="pageLayout">

<!-- Sidebar -->
<aside class="sideBar">
  <div class="sideBarTitle">Aktionen</div>

  <div class="sideBarButtons">
    <button class="btn" onclick="saveBrowser()">Im Browser speichern</button>
    <button class="btn" onclick="loadBrowser()">Browser-Stand laden</button>

    <button class="btn" onclick="openPreview()">Vorschau öffnen</button>
    <button class="btn" onclick="openPreviewPl()">Polnisch öffnen</button>

    <button class="btn" onclick="openPreviewAndPrint()">PDF erzeugen</button>
    <button class="btn" onclick="openPreviewPrintAndWhatsApp()">PDF + WhatsApp</button>

    <button class="btn" onclick="openWhatsAppFromForm()">WhatsApp</button>

    <button class="btn" onclick="copySiteVersion()">Kopie Baustelle</button>
    <button class="btn" onclick="copyTextForCraftnote()">Für Craftnote kopieren</button>

    <button class="btn btnRed" onclick="resetForm()">Formular leeren</button>
  </div>
</aside>

<!-- Inhalt -->
<main>

<div class="wrap">

<div class="card">

<div class="sectionTitle">Grunddaten</div>

<div class="formGrid">
<input id="baustellenname" placeholder="Auftraggeber">
<input id="craftnoteSuchbegriff" placeholder="Craftnote Suchbegriff">

<textarea id="baustellenadresse" class="fullCol" placeholder="Adresse"></textarea>

<select id="craftnoteEingeladen">
<option>nein</option><option>ja</option>
</select>

<select id="baustellenhoehe">
<option>2,00 m</option>
<option>3,00 m</option>
<option>4,00 m</option>
<option>5,00 m</option>
</select>
</div>

<div class="sectionTitle">Lieferung</div>
<textarea id="lieferung1"></textarea>
<textarea id="lieferung3"></textarea>

<div class="sectionTitle">Lager</div>
<textarea id="lager1"></textarea>
<textarea id="lager3"></textarea>

<div class="sectionTitle">Sonstiges</div>
<textarea id="sonstiges" class="bigField"></textarea>

</div>

<div class="card">

<div class="sectionTitle">Vorschau</div>
<div id="previewText" class="previewBox"></div>

<div class="imageGrid">
<div class="imageCard">Bild</div>
<div class="imageCard">Bild</div>
<div class="imageCard">Bild</div>
</div>

</div>

</div>

</main>
</div>

<script>

function showCopyToast(){
  const t=document.getElementById('copyToast');
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1800);
}

function copySiteVersion(){
  navigator.clipboard.writeText("Text kopiert");
  showCopyToast();
}

function copyTextForCraftnote(){
  navigator.clipboard.writeText("Text kopiert");
  showCopyToast();
}

function saveBrowser(){
  localStorage.setItem("test","ok");
}

function loadBrowser(){
  alert("geladen");
}

function openPreview(){alert("Preview")}
function openPreviewPl(){alert("PL")}
function openPreviewAndPrint(){alert("PDF")}
function openPreviewPrintAndWhatsApp(){alert("PDF + WA")}
function openWhatsAppFromForm(){alert("WA")}

function resetForm(){
  document.querySelectorAll("input,textarea").forEach(e=>e.value="");
}

</script>

</body>
</html>
