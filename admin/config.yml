backend:
  name: git-gateway
  branch: main

site_url: https://mennix-007.github.io/Inseldach-Information/
display_url: https://mennix-007.github.io/Inseldach-Information/

publish_mode: simple

media_folder: "uploads"
public_folder: "/uploads"

media_library:
  name: uploadcare

collections:
  - name: "content"
    label: "Inhalte"
    files:
      - name: "news"
        label: "Kacheln & Laufband"
        file: "news.json"
        format: "json"
        fields:
          - label: "Heute wichtig"
            name: "heuteWichtig"
            widget: "list"
            allow_add: false
            allow_delete: false
            min: 4
            max: 4
            default:
              - ""
              - ""
              - ""
              - ""
            field:
              label: "Eintrag"
              name: "item"
              widget: "string"

          - label: "Hinweise"
            name: "daueranzeige"
            widget: "list"
            allow_add: true
            field:
              label: "Eintrag"
              name: "item"
              widget: "string"

          - label: "Bild für Hinweise"
            name: "daueranzeigeBild"
            widget: "image"
            required: false

          - label: "Info für längeren Zeitraum"
            name: "langzeitInfo"
            widget: "list"
            allow_add: true
            field:
              label: "Eintrag"
              name: "item"
              widget: "string"

          - label: "Laufband (Ticker)"
            name: "ticker"
            widget: "list"
            allow_add: true
            field:
              label: "Eintrag"
              name: "item"
              widget: "string"

      - name: "special"
        label: "Sonderseite / Anzeige"
        file: "special.json"
        format: "json"
        fields:
          - label: "Aktiv"
            name: "active"
            widget: "boolean"
            default: false

          - label: "Überschrift"
            name: "title"
            widget: "string"
            required: false

          - label: "Text"
            name: "text"
            widget: "text"
            required: false

          - label: "Bild"
            name: "image"
            widget: "image"
            required: false

          - label: "Datum von"
            name: "dateFrom"
            widget: "string"
            required: false

          - label: "Datum bis"
            name: "dateTo"
            widget: "string"
            required: false

          - label: "Anzeige Dauer (Sekunden)"
            name: "showDuration"
            widget: "number"
            value_type: "int"
            min: 1
            default: 20

          - label: "Hauptseite Dauer (Sekunden)"
            name: "hideDuration"
            widget: "number"
            value_type: "int"
            min: 1
            default: 40
