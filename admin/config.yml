backend:
  name: git-gateway
  branch: main

site_url: https://mennix-007.github.io/Inseldach-Information/
display_url: https://mennix-007.github.io/Inseldach-Information/

publish_mode: simple

media_folder: "uploads"
public_folder: "/uploads"

media_library:
  name: uploadcare

collections:
  - name: "content"
    label: "Inhalte"
    files:

      # =========================
      # NEWS / HAUPTANZEIGE
      # =========================
      - name: "news"
        label: "Kacheln & Laufband"
        file: "news.json"
        format: "json"
        fields:

          - label: "Heute wichtig"
            name: "heuteWichtig"
            widget: "list"
            allow_add: false
            allow_delete: false
            min: 4
            max: 4
            default:
              - ""
              - ""
              - ""
              - ""
            field:
              label: "Eintrag"
              name: "item"
              widget: "string"

          - label: "Hinweise"
            name: "daueranzeige"
            widget: "list"
            allow_add: true
            field:
              label: "Eintrag"
              name: "item"
              widget: "string"

          - label: "Bild für Hinweise"
            name: "daueranzeigeBild"
            widget: "image"
            required: false

          - label: "Info für längeren Zeitraum"
            name: "langzeitInfo"
            widget: "list"
            allow_add: true
            field:
              label: "Eintrag"
              name: "item"
              widget: "string"

          - label: "Laufband (Ticker)"
            name: "ticker"
            widget: "list"
            allow_add: true
            field:
              label: "Eintrag"
              name: "item"
              widget: "string"

      # =========================
      # SONDERSEITE
      # =========================
      - name: "special"
        label: "Sonderseite / Anzeige"
        file: "special.json"
        format: "json"
        fields:

          - label: "Aktiv"
            name: "active"
            widget: "boolean"
            default: false

          - label: "Überschrift"
            name: "title"
            widget: "string"
            required: false

          - label: "Text"
            name: "text"
            widget: "text"
            required: false

          - label: "Bild"
            name: "image"
            widget: "image"
            required: false

          - label: "Datum von"
            name: "dateFrom"
            widget: "string"
            required: false

          - label: "Datum bis"
            name: "dateTo"
            widget: "string"
            required: false

          - label: "Anzeige Dauer (Sekunden)"
            name: "showDuration"
            widget: "number"
            value_type: "int"
            min: 1
            default: 20

          - label: "Hauptseite Dauer (Sekunden)"
            name: "hideDuration"
            widget: "number"
            value_type: "int"
            min: 1
            default: 40

      # =========================
      # BAUSTELLENSTART
      # =========================
      - name: "baustellenstart"
        label: "Start neue Baustelle"
        file: "baustellenstart.json"
        format: "json"
        fields:

          - label: "Feste Überschrift"
            name: "title"
            widget: "string"
            default: "Neustart Baustelle"

          - label: "Baustellenname"
            name: "baustellenname"
            widget: "string"
            required: false

          - label: "Baustellenadresse"
            name: "baustellenadresse"
            widget: "text"
            required: false

          - label: "Suchbegriff Craftnote"
            name: "craftnoteSuchbegriff"
            widget: "string"
            required: false

          - label: "Craftnote eingeladen?"
            name: "craftnoteEingeladen"
            widget: "select"
            options:
              - { label: "Ja", value: "ja" }
              - { label: "Nein", value: "nein" }
            default: "nein"

          - label: "Gesamte Baustelle Stundenlohn"
            name: "gesamteBaustelleStundenlohn"
            widget: "boolean"
            default: false

          - label: "Teilweise Stundenlohn"
            name: "teilweiseStundenlohn"
            widget: "boolean"
            default: false

          - label: "Eventuell teilweise Stundenlohn"
            name: "eventuellTeilweiseStundenlohn"
            widget: "boolean"
            default: false

          - label: "Festpreisangebot"
            name: "festpreisangebot"
            widget: "boolean"
            default: false

          - label: "Zugang"
            name: "zugang"
            widget: "select"
            options:
              - { label: "Gerüst erforderlich", value: "geruest" }
              - { label: "Leiter reicht", value: "leiter" }

          - label: "Baustellenhöhe"
            name: "baustellenhoehe"
            widget: "select"
            options:
              - "2,00 m"
              - "2,50 m"
              - "3,00 m"
              - "3,50 m"
              - "4,00 m"
              - "4,50 m"
              - "5,00 m"
              - "5,50 m"
              - "6,00 m"
              - "6,50 m"
              - "7,00 m"
              - "7,50 m"
              - "8,00 m"
              - "8,50 m"
              - "9,00 m"
              - "9,50 m"
              - "10,00 m"
              - "10,50 m"
              - "11,00 m"
              - "11,50 m"
              - "12,00 m"
              - "12,50 m"
              - "13,00 m"
              - "13,50 m"
              - "14,00 m"
              - "14,50 m"
              - "15,00 m"

          - label: "Worum geht es hier / Was muss gemacht werden"
            name: "worumGehtEs"
            widget: "text"
            required: false

          - label: "Was wird zur Baustelle geliefert - Feld 1"
            name: "lieferung1"
            widget: "text"

          - label: "Was wird zur Baustelle geliefert - Feld 2"
            name: "lieferung2"
            widget: "text"

          - label: "Was wird zur Baustelle geliefert - Feld 3"
            name: "lieferung3"
            widget: "text"

          - label: "Was muss mitgenommen werden vom Lager - Feld 1"
            name: "lager1"
            widget: "text"

          - label: "Was muss mitgenommen werden vom Lager - Feld 2"
            name: "lager2"
            widget: "text"

          - label: "Was muss mitgenommen werden vom Lager - Feld 3"
            name: "lager3"
            widget: "text"

          - label: "Bild 1"
            name: "bild1"
            widget: "image"

          - label: "Bild 2"
            name: "bild2"
            widget: "image"

          - label: "Bild 3"
            name: "bild3"
            widget: "image"

          - label: "Sonstiges bitte nicht vergessen"
            name: "sonstiges"
            widget: "text"

      # =========================
      # KUNDENBENACHRICHTIGUNG
      # =========================
      - name: "kundeninfo"
        label: "Kundenbenachrichtigung"
        file: "kundeninfo.json"
        format: "json"
        fields:

          - label: "Feste Überschrift"
            name: "title"
            widget: "string"
            default: "Kundeninformation"

          - label: "Kunde"
            name: "kunde"
            widget: "string"
            required: false

          - label: "Baustellenname"
            name: "baustellenname"
            widget: "string"
            required: false

          - label: "Baustellenadresse"
            name: "baustellenadresse"
            widget: "text"
            required: false

          - label: "Aktuelle Information"
            name: "text"
            widget: "text"
            required: false

          - label: "Bild 1"
            name: "bild1"
            widget: "image"
            required: false

          - label: "Bild 2"
            name: "bild2"
            widget: "image"
            required: false

          - label: "Bild 3"
            name: "bild3"
            widget: "image"
            required: false

          - label: "Sonstiges"
            name: "sonstiges"
            widget: "text"
            required: false

          - label: "Feedbackfrage 1"
            name: "feedbackFrage1"
            widget: "string"
            default: "Finden Sie es gut, dass Sie von uns eine Benachrichtigung über WhatsApp erhalten?"

          - label: "Feedbackfrage 2"
            name: "feedbackFrage2"
            widget: "string"
            default: "Möchten Sie auch in Zukunft weiter Nachrichten von der Firma Inseldachdecker erhalten?"

          - label: "Antwortvorlage"
            name: "feedbackAntwortVorlage"
            widget: "text"
            default: "Antwort bitte kurz per WhatsApp:\n1. Benachrichtigung gut? Ja / Nein\n2. Weitere Nachrichten? Ja / Nein\n3. Falls gewünscht, Ihre Anmerkung:"
